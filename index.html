<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admissions Help Desk • Chat with Raushni</title>
    <style>
      :root{
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: rgba(17,24,39,.08);
        --shadow: 0 10px 30px rgba(17,24,39,.08);
        --brand1: #4f46e5;
        --brand2: #06b6d4;

        --assistant: #f3f4f6;
        --assistantText: #111827;

        --user: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
        --userText: #ffffff;

        --radius: 18px;
      }

      *{ box-sizing:border-box; }
      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background: radial-gradient(1200px 600px at 10% -10%, rgba(79,70,229,.20), transparent 60%),
                    radial-gradient(900px 500px at 110% 10%, rgba(6,182,212,.16), transparent 55%),
                    var(--bg);
        color: var(--text);
      }

      .wrap{ max-width: 920px; margin: 28px auto; padding: 16px; }

      .header{
        display:flex; align-items:center; justify-content:space-between;
        gap: 12px; margin-bottom: 14px;
      }

      .title{ display:flex; flex-direction:column; gap:4px; }
      .title h1{ margin:0; font-size: 20px; letter-spacing: .2px; }
      .title .sub{ color: var(--muted); font-size: 13px; }

      .badge{
        padding: 8px 10px; border-radius: 999px;
        background: rgba(79,70,229,.10);
        color: #3730a3;
        border: 1px solid rgba(79,70,229,.20);
        font-size: 12px; white-space: nowrap;
      }

      .card{
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        overflow:hidden;
      }

      .topbar{
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display:flex; align-items:center; gap: 12px;
        background: linear-gradient(180deg, rgba(79,70,229,.08), transparent);
      }

      .avatar{
        width: 36px; height: 36px; border-radius: 12px;
        background: linear-gradient(135deg, rgba(79,70,229,.95), rgba(6,182,212,.9));
        display:grid; place-items:center;
        color:#fff; font-weight: 800; letter-spacing: .5px;
      }

      .topbar .meta{ display:flex; flex-direction:column; line-height: 1.2; }
      .topbar .meta .name{ font-weight: 700; }
      .topbar .meta .status{ font-size: 12px; color: var(--muted); }

      #box{
        height: min(64vh, 560px);
        overflow:auto;
        padding: 18px 16px 10px 16px;
        background: linear-gradient(180deg, rgba(17,24,39,.02), transparent 35%);
      }

      .row{ display:flex; margin: 10px 0; }
      .row.assistant{ justify-content:flex-start; }
      .row.user{ justify-content:flex-end; }

      .bubble{
        max-width: min(78%, 680px);
        padding: 12px 14px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: 0 6px 16px rgba(17,24,39,.06);
        font-size: 14.5px;
        line-height: 1.45;
        word-wrap: break-word;
        white-space: pre-wrap;
      }

      .assistant .bubble{
        background: var(--assistant);
        color: var(--assistantText);
        border-top-left-radius: 10px;
      }

      .user .bubble{
        background: var(--user);
        color: var(--userText);
        border: none;
        border-top-right-radius: 10px;
      }

      .time{ margin-top: 6px; font-size: 11px; color: var(--muted); opacity: .9; padding: 0 6px; }

      .composer{
        padding: 12px;
        border-top: 1px solid var(--border);
        background: #fff;
      }

      .bar{ display:flex; gap:10px; align-items:flex-end; }

      textarea{
        flex:1;
        resize:none;
        min-height: 46px;
        max-height: 120px;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        outline: none;
        font-family: inherit;
        font-size: 14.5px;
        background: #fff;
      }
      textarea:focus{
        border-color: rgba(79,70,229,.35);
        box-shadow: 0 0 0 4px rgba(79,70,229,.10);
      }

      button{
        padding: 12px 14px;
        border-radius: 14px;
        border: none;
        cursor:pointer;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, var(--brand1), var(--brand2));
        box-shadow: 0 10px 20px rgba(79,70,229,.18);
        min-width: 92px;
      }
      button:active{ transform: translateY(1px); }
      button:disabled{ opacity: .65; cursor:not-allowed; }

      .footerNote{
        padding: 10px 2px 0;
        font-size: 12px;
        color: var(--muted);
        text-align:center;
      }

      .dots{ display:inline-flex; gap:4px; align-items:center; }
      .dot{
        width:6px; height:6px;
        border-radius:999px;
        background: rgba(17,24,39,.55);
        animation: blink 1.2s infinite ease-in-out;
      }
      .dot:nth-child(2){ animation-delay: .15s; }
      .dot:nth-child(3){ animation-delay: .30s; }
      @keyframes blink{
        0%, 80%, 100% { opacity: .25; transform: translateY(0); }
        40% { opacity: .9; transform: translateY(-2px); }
      }

      @media (max-width: 640px){
        .badge{ display:none; }
        #box{ height: 70vh; }
        .bubble{ max-width: 88%; }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">
          <h1>Admissions Help Desk</h1>
          <div class="sub">Chat with Raushni • Hindi + English • Fast replies</div>
        </div>
        <div class="badge">Powered by Vapi</div>
      </div>

      <div class="card">
        <div class="topbar">
          <div class="avatar">R</div>
          <div class="meta">
            <div class="name">Raushni • Admissions Counselor</div>
            <div class="status">Online</div>
          </div>
        </div>

        <div id="box"></div>

        <div class="composer">
          <div class="bar">
            <textarea id="msg" placeholder="Type your message… (Enter to send, Shift+Enter for new line)"></textarea>
            <button id="send">Send</button>
          </div>
          <div class="footerNote">
            New chat = page refresh. (Session is not saved in localStorage.)
          </div>
        </div>
      </div>
    </div>

    <script>
      const box = document.getElementById("box");
      const msg = document.getElementById("msg");
      const sendBtn = document.getElementById("send");

      // ✅ New session per page load, but memory is kept during the chat
      let currentSessionId = null;

      function nowTime() {
        const d = new Date();
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function escapeHtml(s) {
        return (s || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function addBubble(kind, text) {
        const row = document.createElement("div");
        row.className = `row ${kind}`;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = text;

        const wrap = document.createElement("div");
        wrap.appendChild(bubble);

        const t = document.createElement("div");
        t.className = "time";
        t.textContent = nowTime();
        wrap.appendChild(t);

        row.appendChild(wrap);
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
        return row;
      }

      function typingRow() {
        return addBubble(
          "assistant",
          `<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>`
        );
      }

      async function send() {
        const text = msg.value.trim();
        if (!text) return;

        msg.value = "";
        msg.style.height = "46px";

        addBubble("user", escapeHtml(text));

        const typingEl = typingRow();
        sendBtn.disabled = true;

        try {
          const resp = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: text,
              sessionId: currentSessionId
            })
          });

          const data = await resp.json();
          typingEl.remove();
          sendBtn.disabled = false;

          // If backend created a session, store it in memory (NOT localStorage)
          if (data?.sessionId) currentSessionId = data.sessionId;

          if (!resp.ok) {
            addBubble("assistant", escapeHtml(data?.error || "Error"));
            return;
          }

          // Show ONLY the final assistant message (clean UI)
          const replies = Array.isArray(data.replies) ? data.replies : [data.reply];
          const clean = replies.filter(Boolean);

          if (!clean.length) addBubble("assistant", "…");
          else addBubble("assistant", escapeHtml(clean[clean.length - 1]));
        } catch (e) {
          typingEl.remove();
          sendBtn.disabled = false;
          addBubble("assistant", "Network error. Please try again.");
        }
      }

      msg.addEventListener("input", () => {
        msg.style.height = "auto";
        msg.style.height = Math.min(msg.scrollHeight, 120) + "px";
      });

      sendBtn.onclick = send;
      msg.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });

      addBubble("assistant", "नमस्कार! मैं रौशनी हूँ। शुरू करने के लिए अपना पूरा नाम बताइए।");
    </script>
  </body>
</html>
