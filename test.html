<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>API Chat Test</title>
  </head>
  <body style="font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto;">
    <h2>Test /api/chat</h2>
    <input id="msg" style="width: 100%; padding: 10px; font-size: 16px;" value="hi" />
    <button id="send" style="margin-top: 10px; padding: 10px 14px;">Send</button>
    <pre id="out" style="margin-top: 20px; background: #f5f5f5; padding: 12px; white-space: pre-wrap;"></pre>

    <script>
      const out = document.getElementById("out");
      document.getElementById("send").onclick = async () => {
        out.textContent = "Sending...";
        const message = document.getElementById("msg").value;

        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
          });
          const text = await r.text();
          out.textContent = `HTTP ${r.status}\n\n${text}`;
        } catch (e) {
          out.textContent = String(e);
        }
      };
    </script>
  </body>
</html>
